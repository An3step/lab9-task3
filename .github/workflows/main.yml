name: Cross-platform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Сборка для Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.*' # Рекомендуемая стабильная версия
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtsql qtquickcontrols2'
      - name: Build
        run: |
          cmake -B build -G Ninja
          cmake --build build --config Release

  # 2. Сборка для Android
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.*'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia qtsql qtquickcontrols2'
      - name: Build Android APK
        run: |
          cmake -B build_android \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.Qt6_DIR }}/lib/cmake/Qt6/qt.toolchain.cmake \
            -DQT_CHAINLOAD_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -G Ninja
          cmake --build build_android --target apk

  # 3. Сборка для iOS
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.*'
          target: 'ios'
          modules: 'qtmultimedia qtsql qtquickcontrols2'
      - name: Build iOS
        run: |
          cmake -B build_ios -G Xcode -DCMAKE_SYSTEM_NAME=iOS
          cmake --build build_ios --config Release

  # 4. Сборка для Web (WebAssembly)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.37' # Версия должна соответствовать Qt 6.5
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.*'
          target: 'wasm_singlethread'
          modules: 'qtmultimedia qtsql qtquickcontrols2'
      - name: Build WebAssembly
        run: |
          qt-cmake -B build_wasm -G Ninja
          cmake --build build_wasm