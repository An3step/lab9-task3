name: Cross-platform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Сборка для Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: echo "Installing Qt for Windows..."
      - name: Build
        run: echo "Building for Windows..."
      - name: Unit Tests
        run: |
          echo "Running unit tests..."
          powershell -Command "Start-Sleep -Seconds 180"
      - name: Integration Tests
        run: |
          echo "Running integration tests..."
          powershell -Command "Start-Sleep -Seconds 180"
      - name: UI Tests
        run: |
          echo "Running UI tests..."
          powershell -Command "Start-Sleep -Seconds 180"
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/
          retention-days: 7

  # 2. Сборка для Android
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: echo "Installing Qt for Android..."
      - name: Build Android APK
        run: echo "Building APK for Android..."
      - name: Unit Tests
        run: |
          echo "Running unit tests..."
          sleep 180
      - name: Integration Tests
        run: |
          echo "Running integration tests..."
          sleep 180
      - name: UI Tests
        run: |
          echo "Running UI tests..."
          sleep 180
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/android/
          retention-days: 7

  # 3. Сборка для iOS
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: echo "Installing Qt for iOS..."
      - name: Build iOS
        run: echo "Building for iOS..."
      - name: Unit Tests
        run: |
          echo "Running unit tests..."
          sleep 180
      - name: Integration Tests
        run: |
          echo "Running integration tests..."
          sleep 180
      - name: UI Tests
        run: |
          echo "Running UI tests..."
          sleep 180
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/
          retention-days: 7

  # 4. Сборка для Web (WebAssembly)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Emscripten
        run: echo "Setting up Emscripten..."
      - name: Install Qt
        run: echo "Installing Qt for WebAssembly..."
      - name: Build WebAssembly
        run: echo "Building for WebAssembly..."
      - name: Unit Tests
        run: |
          echo "Running unit tests..."
          sleep 180
      - name: Integration Tests
        run: |
          echo "Running integration tests..."
          sleep 180
      - name: UI Tests
        run: |
          echo "Running UI tests..."
          sleep 180
      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: build/wasm/
          retention-days: 7
