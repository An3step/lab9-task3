name: Cross-platform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Сборка для Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: echo "Installing Qt for Windows..."
      - name: Build
        run: echo "Building for Windows..."

  # 2. Сборка для Android
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: echo "Installing Qt for Android..."
      - name: Build Android APK
        run: echo "Building APK for Android..."

  # 3. Сборка для iOS
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: echo "Installing Qt for iOS..."
      - name: Build iOS
        run: echo "Building for iOS..."

  # 4. Сборка для Web (WebAssembly)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Emscripten
        run: echo "Setting up Emscripten..."
      - name: Install Qt
        run: echo "Installing Qt for WebAssembly..."
      - name: Build WebAssembly
        run: echo "Building for WebAssembly..."